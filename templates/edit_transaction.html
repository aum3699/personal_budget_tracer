{% extends 'base.html' %}

{% block title %}Edit Transaction - Personal Budget Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0">Edit Transaction</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_type" class="form-label">Type</label>
                        <select name="type" class="form-control" id="id_type">
                            <option value="Income" {% if form.type.value == 'Income' %}selected{% endif %}>Income</option>
                            <option value="Expense" {% if form.type.value == 'Expense' %}selected{% endif %}>Expense</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_category" class="form-label">Category</label>
                        <input type="text" name="category" class="form-control" id="id_category" value="{{ form.category.value|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_amount" class="form-label">Amount</label>
                        <input type="number" name="amount" class="form-control" id="id_amount" value="{{ form.amount.value|default:'' }}" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_note" class="form-label">Note</label>
                        <input type="text" name="note" class="form-control" id="id_note" value="{{ form.note.value|default:'' }}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning flex-grow-1">Update</button>
                        <a href="{% url 'index' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
