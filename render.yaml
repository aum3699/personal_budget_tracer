services:
  - type: web
    name: personal-budget-tracer
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn budget_tracker.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: budget_tracker.settings
      - key: DATABASE_URL
        fromDatabase:
          name: personal-budget-tracer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

databases:
  - name: personal-budget-tracer-db
    provider: postgres
    plan: free
    postgresMajorVersion: 16
