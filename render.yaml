services:
  - type: web
    name: personal-budget-tracer
    runtime: python
    rootDir: personal_budget_tracker_django
    buildCommand: pip install -r requirements.txt && python manage.py makemigrations && python manage.py migrate auth --noinput && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: gunicorn budget_tracker.wsgi:application --bind 0.0.0.0:$PORT
